# S3 datos de pasajeros (apps label ES). Un bloque por asiento.
# PENDIENTE DE VALIDAR: campos extra por tipo (Menor: fecha nac.; Estudiante/
# INSEN: credencial) no confirmados aun para estas marcas (ver baseline-suite.md).
appId: any
---
- tapOn: { text: "Menor (3 a 11 años)", index: 0, optional: true }
- tapOn: { text: "Nombre", index: 0 }
- inputText: "Nombre0"
- tapOn: { text: "Primer apellido", index: 0 }
- inputText: "Apellido0"
- tapOn: { text: "Correo" }
- inputText: "qa.label.test@reservamos.mx"
- tapOn: { text: ".*no se permite que ningún menor viaje solo.*", optional: true }
- scrollUntilVisible:
    element:
      text: "Siguiente"
    direction: DOWN
- tapOn: { text: "Siguiente" }
