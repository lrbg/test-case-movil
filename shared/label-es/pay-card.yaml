# S4 pago con tarjeta (apps label ES).
# PENDIENTE DE VALIDAR contra emulador real (ver nota en select-seats.yaml).
# env: BUYER_PHONE
appId: any
---
- tapOn: { text: "Usar datos del primer pasajero" }
- tapOn: { text: "Telefono" }
- eraseText: 40
- inputText: ${BUYER_PHONE}
- tapOn: { text: "Tarjeta" }
- tapOn: { id: "number" }
- inputText: "4111 1111 1111 1111"
- tapOn: { id: "securityCode" }
- inputText: "737"
- tapOn: { id: "holderName" }
- inputText: "John Doe"
- tapOn: { text: "03" }
- tapOn: { text: "2030" }
- scrollUntilVisible:
    element:
      text: "Pagar.*"
    direction: DOWN
- tapOn: { text: "Pagar.*" }
