# S4 pago con tarjeta (apps label ES).
# PENDIENTE DE VALIDAR contra emulador real (ver nota en select-seats.yaml).
# env: BUYER_PHONE
appId: any
---
# El sandbox a veces muestra un modal "El precio ha cambiado" al entrar a
# pago (revalidacion de tarifa); confirmado en ETN, por analogia aqui tambien.
- tapOn: { text: "Continuar compra", optional: true }
- tapOn: { text: "Usar datos del primer pasajero" }
- tapOn: { text: "Telefono" }
- eraseText: 40
- inputText: ${BUYER_PHONE}
- tapOn: { text: "Tarjeta" }
- tapOn: { id: "number" }
- inputText: "4111 1111 1111 1111"
- tapOn: { id: "securityCode" }
- inputText: "737"
- tapOn: { id: "holderName" }
- inputText: "John Doe"
# Mes/Año son selectores nativos: hay que abrir el dropdown antes de elegir
# el valor (confirmado en corrida real: tocar el valor directo no hace nada).
- tapOn: { text: "Mes" }
- tapOn: { text: "03" }
- tapOn: { text: "Año" }
- tapOn: { text: "2030" }
- scrollUntilVisible:
    element:
      text: "Pagar.*"
    direction: DOWN
- tapOn: { text: "Pagar.*" }
