# S3 datos de pasajeros (ETN, testIDs).
# env: PAX_COUNT, PAX_CATEGORY_0.. PAX_CATEGORY_N, INSURANCE (on|off)
appId: mx.com.etn.etnturistarlujo
---
- tapOn: { id: "passenger-name-input-0" }
- inputText: "Nombre0"
- tapOn: { id: "passenger-lastname-input-0" }
- inputText: "Apellido0"
- tapOn: { id: "passenger-email-input-0" }
- inputText: "qa.etn.test@reservamos.mx"
- scrollUntilVisible:
    element:
      id: "passenger-name-input-1"
    direction: DOWN
- tapOn: { id: "passenger-name-input-1" }
- inputText: "Nombre1"
- tapOn: { id: "passenger-lastname-input-1" }
- inputText: "Apellido1"
- tapOn: { text: ".*no se permite que ningún menor viaje solo.*", optional: true }
- runFlow:
    when:
      true: ${INSURANCE == "off"}
    commands:
      - scrollUntilVisible:
          element:
            text: "Viajero Protegido"
          direction: DOWN
      - runFlow:
          when:
            visible: { text: "Viajero Protegido", index: 0 }
          commands:
            - tapOn: { text: "Viajero Protegido", index: 0 }
      - runFlow:
          when:
            visible: { text: "Viajero Protegido", index: 1 }
          commands:
            - tapOn: { text: "Viajero Protegido", index: 1 }
- scrollUntilVisible:
    element:
      text: "Siguiente"
    direction: DOWN
- tapOn: { text: "Siguiente" }
