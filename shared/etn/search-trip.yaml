# S0 busqueda (ETN, testIDs).
# env: ORIGIN, DESTINATION, TRIP_TYPE (ida|redondo)
appId: mx.com.etn.etnturistarlujo
---
- tapOn: { text: "No permitir", optional: true }
- tapOn: { text: "No permitir", optional: true }
- tapOn: { id: "search-origin-trigger" }
- inputText: ${ORIGIN}
- tapOn: { id: "search-origin-result-0" }
- inputText: ${DESTINATION}
- tapOn: { id: "search-destination-result-0" }
# "Redondo" NO esta en la pantalla de busqueda (solo Hoy/Manana/Elegir); vive
# DENTRO del calendario que abre "Elegir" (confirmado en corrida real).
- runFlow:
    when:
      true: ${TRIP_TYPE == "redondo"}
    commands:
      - tapOn: { id: "search-date-select" }
      - tapOn: { text: "Redondo" }
      - evalScript: ${output.diaIda = (new Date(Date.now() + 2*86400000)).getDate().toString()}
      - evalScript: ${output.diaRegreso = (new Date(Date.now() + 3*86400000)).getDate().toString()}
      - tapOn: { text: "^${output.diaIda}$" }
      - tapOn: { text: "^${output.diaRegreso}$" }
      - tapOn: { text: "Continuar" }
- runFlow:
    when:
      true: ${TRIP_TYPE != "redondo"}
    commands:
      - tapOn: { id: "search-date-tomorrow" }
      - tapOn: { id: "search-submit-button" }
# "Continuar" del calendario redondo ya auto-busca (confirmado en corrida
# real: aterriza directo en S1); no hace falta tocar BUSCAR de nuevo.
