# S4 pago con tarjeta (ETN). Formulario Cybersource en WebView, accesible por id.
# env: BUYER_NAME, BUYER_LASTNAME, BUYER_PHONE
appId: mx.com.etn.etnturistarlujo
---
# El sandbox a veces muestra un modal "El precio ha cambiado" al entrar a
# pago (revalidacion de tarifa); confirmado en corrida real (BL-01 ETN).
- tapOn: { text: "Continuar compra", optional: true }
- assertVisible: { id: "payment-page-title" }
- tapOn: { id: "payment-use-passenger-data-switch" }
- tapOn: { id: "payment-buyer-phone-input" }
- eraseText: 40
- inputText: ${BUYER_PHONE}
- tapOn: { id: "payment-method-credit-option", optional: true }
- tapOn: { id: "number" }
- inputText: "4111 1111 1111 1111"
- tapOn: { id: "securityCode" }
- inputText: "737"
- tapOn: { id: "holderName" }
- inputText: "John Doe"
# Mes/Año son selectores nativos: hay que abrir el dropdown antes de elegir
# el valor (confirmado en corrida real: tocar el valor directo no hace nada).
- tapOn: { text: "Mes" }
- tapOn: { text: "03" }
- tapOn: { text: "Año" }
- tapOn: { text: "2030" }
- scrollUntilVisible:
    element:
      text: "Pagar \\$.*"
    direction: DOWN
- tapOn: { text: "Pagar \\$.*" }
