# S3 dados dos passageiros (Gontijo, PT). Um bloco por assento.
# Gotcha critico: o DatePicker de "Data de nascimento*" sempre abre em HOJE e
# nao reflete o valor escrito no campo; se "Proximo" nao avancar sem erro,
# reabra o picker e refixe a data (nao confie no texto mostrado).
appId: br.com.gontijo.viagens
---
- tapOn: { text: "Menor (3 a 11 anos)", index: 0 }
- tapOn: { text: "Nome", index: 0 }
- inputText: "Nome0"
- tapOn: { text: "Sobrenome", index: 0 }
- inputText: "Sobrenome0"
- tapOn: { text: "E-mail" }
- inputText: "qa.gontijo.test@reservamos.mx"
- tapOn: { text: "Data de nascimento" }
- tapOn: { text: "OK" }
# se o Proximo nao avancar, reabrir o picker acima e refixar a data
- tapOn: { text: "Categoria" }
- scrollUntilVisible:
    element:
      text: "Proximo"
    direction: DOWN
- tapOn: { text: "Proximo" }
